<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naomi Salas Portfoli</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #1f1f1f;
      text-align: center;
    }

    .cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 56px;
      font-weight: 300;
      letter-spacing: 2px;
      margin: 0;
    }

    p {
      margin-top: 12px;
      margin-bottom: 40px;
      font-size: 16px;
      color: #666;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: transparent;
      color: #1f1f1f;
      border: 1px solid #1f1f1f;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #1f1f1f;
      color: #ffffff;
    }

    #pdfSection {
      display: none;
      padding: 30px;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
      background: white;
    }

    .back {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <section class="cover" id="cover">
    <h1>Naomi Salas Portfolio</h1>
    <p>Architecture & Urban Design</p>

    <div class="buttons">
      <button onclick="loadPDF('portfolio_de.pdf')">Deutsch</button>
      <button onclick="loadPDF('portfolio_en.pdf')">English</button>
      <button onclick="loadPDF('portfolio_es.pdf')">Español</button>
    </div>
  </section>

  <section id="pdfSection">
    <div class="back">
      <button onclick="goBack()">← Zurück</button>
    </div>

    <iframe id="pdfViewer"></iframe>
  </section>

  <script>
    function loadPDF(pdfFile) {
      document.getElementById("cover").style.display = "none";
      document.getElementById("pdfSection").style.display = "block";
      document.getElementById("pdfViewer").src = pdfFile;
    }

    function goBack() {
      document.getElementById("pdfSection").style.display = "none";
      document.getElementById("cover").style.display = "flex";
      document.getElementById("pdfViewer").src = "";
    }
  </script>

</body>
</html>
